<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>勤怠管理ツール</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>勤怠管理ツール</h1>
      <p>
        従業員の勤怠情報を登録・検索・集計・CSV出力できる業務支援ツール
      </p>
    </header>

    <main>
      <!-- 登録エリア -->
      <section class="card form-section">
        <h2>勤怠登録</h2>

        <div id="messageArea">
          <p id="errorMessage" class="message error-message"></p>
          <p id="successMessage" class="message success-message"></p>
        </div>

        <form id="attendanceForm" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label for="date">勤務日 <span class="required">※</span></label>
              <input type="date" id="date" name="date" />
            </div>

            <div class="form-group">
              <label for="name">氏名 <span class="required">※</span></label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="例：山田 太郎"
              />
            </div>

            <div class="form-group">
              <label for="clockIn">出勤時刻 <span class="required">※</span></label>
              <input type="time" id="clockIn" name="clockIn" />
            </div>

            <div class="form-group">
              <label for="clockOut">退勤時刻 <span class="required">※</span></label>
              <input type="time" id="clockOut" name="clockOut" />
            </div>

            <div class="form-group">
              <label for="breakTime">休憩時間（分） <span class="required">※</span></label>
              <input
                type="number"
                id="breakTime"
                name="breakTime"
                min="0"
                step="1"
                placeholder="例：60"
              />
            </div>

            <div class="form-group form-group-full">
              <label for="note">備考</label>
              <textarea
                id="note"
                name="note"
                rows="3"
                placeholder="例：通常勤務、午前のみ出勤 など"
              ></textarea>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" id="saveButton">登録</button>
            <button type="reset" id="resetButton" class="secondary-button">リセット</button>
          </div>
        </form>
      </section>

      <!-- 検索・絞り込みエリア -->
      <section class="card filter-section">
        <h2>検索・絞り込み</h2>

        <div class="filter-grid">
          <div class="form-group">
            <label for="searchName">氏名検索</label>
            <input
              type="text"
              id="searchName"
              placeholder="氏名を入力"
            />
          </div>

          <div class="form-group">
            <label for="filterMonth">月別フィルター</label>
            <input type="month" id="filterMonth" />
          </div>

          <div class="form-group button-group">
            <label class="hidden-label">操作</label>
            <button type="button" id="clearFilterButton" class="secondary-button">
              絞り込み解除
            </button>
          </div>

          <div class="form-group button-group">
            <label class="hidden-label">CSV</label>
            <button type="button" id="exportCsvButton">
              CSV出力
            </button>
          </div>
        </div>
      </section>

      <!-- 集計エリア -->
      <section class="card summary-section">
        <h2>月間集計</h2>

        <div class="summary-cards">
          <div class="summary-card">
            <p class="summary-label">対象件数</p>
            <p class="summary-value" id="totalCount">0件</p>
          </div>

          <div class="summary-card">
            <p class="summary-label">総実働時間</p>
            <p class="summary-value" id="totalWorkTime">0時間00分</p>
          </div>

          <div class="summary-card">
            <p class="summary-label">平均実働時間</p>
            <p class="summary-value" id="averageWorkTime">0時間00分</p>
          </div>
        </div>
      </section>

      <!-- 一覧エリア -->
      <section class="card list-section">
        <h2>勤怠一覧</h2>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>勤務日</th>
                <th>氏名</th>
                <th>出勤</th>
                <th>退勤</th>
                <th>休憩（分）</th>
                <th>実働時間</th>
                <th>備考</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="attendanceList">
              <!-- JavaScriptで描画 -->
            </tbody>
          </table>
        </div>

        <p id="emptyMessage" class="empty-message">
          まだ勤怠データが登録されていません。
        </p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
